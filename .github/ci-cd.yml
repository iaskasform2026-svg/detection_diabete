name: ci-cd-medical-ai

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic import tests
        run: |
          python -c "from app.main import app; print(app.title)"
          python -c "from app.model_service import ModelService; print(ModelService().version)"

      - name: Build Docker image
        run: docker build -t medical-diabetes-api:latest .

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: echo "Deploy step to registry / cluster goes here"
